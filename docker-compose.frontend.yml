services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    working_dir: /app
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "8080:8080"

volumes:
  frontend_node_modules:
